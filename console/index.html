<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nordwind AP Cockpit</title>
<style>
  :root{
    --shell:#354a5f; --accent:#0a6ed1; --bg:#f7f7f7; --card:#fff; --line:#e5e5e5;
    --text:#32363a; --muted:#6a6d70; --pos:#107e3e; --neg:#bb0000; --crit:#e9730c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"72",-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .shell{background:var(--shell);color:#fff;height:48px;display:flex;align-items:center;padding:0 16px;gap:12px}
  .shell .logo{width:24px;height:24px;border-radius:4px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .shell .title{font-weight:600}
  .shell .actor{margin-left:auto;opacity:.85;font-size:13px}
  .wrap{display:flex;gap:16px;padding:16px;align-items:flex-start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .inbox{width:340px;flex:none;overflow:hidden}
  .inbox h2,.detail h2{margin:0;padding:12px 16px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--line)}
  .row{padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .row:hover{background:#f2f7fd}
  .row.sel{background:#e8f1fc;box-shadow:inset 3px 0 0 var(--accent)}
  .dropzone{margin:12px 16px;padding:16px;border:2px dashed #b3c2d1;border-radius:8px;text-align:center;color:var(--muted);cursor:pointer;font-size:13px;line-height:1.4}
  .dropzone:hover{border-color:var(--accent)}
  .dropzone.over{border-color:var(--accent);background:#f2f7fd;color:var(--accent)}
  .dropzone.busy{border-style:solid;border-color:var(--accent);color:var(--accent);cursor:progress}
  .dropzone .big{font-size:22px;display:block;margin-bottom:4px}
  .row .top{display:flex;justify-content:space-between;align-items:center}
  .row .id{font-weight:600}
  .row .vend{color:var(--muted);font-size:13px;margin-top:2px}
  .row .amt{font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;font-weight:600}
  .pill.ready{background:#ebf5eb;color:var(--pos)}
  .pill.exception{background:#fdf0e5;color:var(--crit)}
  .pill.posted{background:#e8f1fc;color:var(--accent)}
  .pill.rejected{background:#f0f0f0;color:var(--muted)}
  .detail{flex:1;min-width:0}
  .detail .body{padding:16px}
  .empty{padding:40px 16px;color:var(--muted);text-align:center}
  .head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .head .h-id{font-size:20px;font-weight:600}
  .head .h-vend{color:var(--muted)}
  .kv{display:flex;gap:24px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-bottom:16px}
  .kv b{color:var(--text);font-weight:600}
  table{width:100%;border-collapse:collapse;margin:8px 0}
  th{text-align:left;font-size:12px;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:6px 8px;border-bottom:1px solid #f0f0f0;font-variant-numeric:tabular-nums}
  .banner{padding:10px 14px;border-radius:6px;margin:14px 0;font-weight:600}
  .banner.pass{background:#ebf5eb;color:var(--pos);border:1px solid #b5dcb5}
  .banner.fail{background:#fdeaea;color:var(--neg);border:1px solid #f0c0c0}
  .banner ul{margin:6px 0 0;padding-left:18px;font-weight:400}
  .actions{display:flex;gap:10px;margin:16px 0}
  button{font:inherit;padding:8px 18px;border-radius:6px;border:1px solid var(--accent);cursor:pointer}
  .b-approve{background:var(--accent);color:#fff}
  .b-reject{background:#fff;color:var(--neg);border-color:var(--neg)}
  .b-onboard{background:#fff;color:var(--accent)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .audit{margin-top:20px}
  .audit h3{font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em}
  .trail{font-family:"Courier New",monospace;font-size:13px;background:#fafafa;border:1px solid var(--line);border-radius:6px;padding:10px}
  .trail .line{padding:2px 0;color:#444}
  .trail .ok{color:var(--pos)}
  .chain{margin-top:6px;font-size:12px;color:var(--pos)}
</style>
</head>
<body>
  <div class="shell">
    <div class="logo">N</div>
    <div class="title" id="title">Nordwind AP Cockpit</div>
    <div class="actor" id="actor"></div>
  </div>
  <div class="wrap">
    <div class="panel inbox">
      <h2>Inbox</h2>
      <div id="drop" class="dropzone">
        <span class="big">&#8681;</span>
        <span id="drop-label">Drop an invoice PDF or image here, or click to choose</span>
      </div>
      <input type="file" id="file" accept=".pdf,.png,.jpg,.jpeg,.webp" hidden>
      <div id="inbox"></div>
    </div>
    <div class="panel detail">
      <h2>Document</h2>
      <div class="body" id="detail"><div class="empty">Select a document from the inbox.</div></div>
    </div>
  </div>

<script>
let selected = null;

async function getJSON(url){ const r = await fetch(url); return r.json(); }
async function postJSON(url, body){ const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); return r.json(); }

function pill(s){ const label={ready:"Ready",exception:"Exception",posted:"Posted",rejected:"Rejected"}[s]||s; return `<span class="pill ${s}">${label}</span>`; }

async function loadInbox(){
  const data = await getJSON("/api/inbox");
  document.getElementById("title").textContent = data.title;
  document.getElementById("actor").textContent = data.actor;
  document.getElementById("inbox").innerHTML = data.items.map(it => `
    <div class="row ${it.id===selected?'sel':''}" onclick="select('${it.id}')">
      <div class="top"><span class="id">${it.id}</span>${pill(it.status)}</div>
      <div class="vend">${it.vendor}</div>
      <div class="top"><span class="amt">${it.amount} ${it.currency}</span></div>
      ${it.reason?`<div class="vend" style="color:var(--crit)">${it.reason}</div>`:``}
    </div>`).join("");
}

async function select(id){ selected = id; await loadInbox(); renderDetail(await getJSON("/api/document?id="+id)); }
async function act(url){ const d = await postJSON(url,{id:selected}); await loadInbox(); renderDetail(d); }

function renderDetail(d){
  const rows = d.lines.map(l=>`<tr><td>${l.side}</td><td>${l.account}</td><td style="text-align:right">${l.amount} ${d.currency}</td></tr>`).join("");
  const conf = d.confidence==null ? "" : `<span><b>Read confidence</b> ${(d.confidence*100).toFixed(0)}%</span>`;
  const banner = d.verdict==="PASS"
    ? `<div class="banner pass">Guard: PASS</div>`
    : `<div class="banner fail">Guard: FAIL<ul>${d.reasons.map(r=>`<li>${r}</li>`).join("")}</ul></div>`;
  const canApprove = d.status==="ready";
  const posted = d.status==="posted";
  const actions = posted
    ? `<div class="banner pass">Posted as ${d.posting_id}</div>`
    : d.status==="rejected"
    ? `<div class="banner" style="background:#f0f0f0;color:var(--muted)">Rejected. Nothing was written.</div>`
    : `<div class="actions">
         <button class="b-approve" ${canApprove?"":"disabled"} onclick="act('/api/approve')">Approve &amp; Post</button>
         <button class="b-reject" onclick="act('/api/reject')">Reject</button>
         ${d.can_onboard?`<button class="b-onboard" onclick="act('/api/onboard')">Onboard vendor</button>`:``}
       </div>`;
  const trail = d.audit.length
    ? d.audit.map(e=>`<div class="line"><span class="ok">${e.op.padEnd(8)}</span> ${e.target.padEnd(14)} ${e.outcome} <span style="color:#999">· ${e.actor}</span></div>`).join("")
    : `<div class="line" style="color:#999">No actions yet. Approving posts it and writes the trail.</div>`;
  document.getElementById("detail").innerHTML = `
    <div class="head">
      <div><div class="h-id">${d.id}</div><div class="h-vend">${d.vendor}</div></div>
      ${pill(d.status)}
    </div>
    <div class="kv"><span><b>Date</b> ${d.date}</span><span><b>Net</b> ${d.net}</span><span><b>Tax</b> ${d.tax}</span><span><b>Gross</b> ${d.gross} ${d.currency}</span>${conf}</div>
    <table>
      <tr><th>Side</th><th>Account</th><th style="text-align:right">Amount</th></tr>
      ${rows}
    </table>
    <div class="kv"><span><b>Tax code</b> ${d.tax_code}</span><span><b>Cost center</b> ${d.cost_center}</span></div>
    ${banner}
    ${actions}
    <div class="audit">
      <h3>Audit trail</h3>
      <div class="trail">${trail}<div class="chain">${d.audit.length?("Chain verifies: "+(d.audit_ok?"yes, untampered":"NO")) :""}</div></div>
    </div>`;
}

// --- Drop a PDF: read it with the vision model, drop it into the inbox ---
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");
const dropLabel = document.getElementById("drop-label");
const DROP_TEXT = "Drop an invoice PDF or image here, or click to choose";
drop.onclick = () => fileInput.click();
fileInput.onchange = () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); };
drop.ondragover = e => { e.preventDefault(); drop.classList.add("over"); };
drop.ondragleave = () => drop.classList.remove("over");
drop.ondrop = e => { e.preventDefault(); drop.classList.remove("over"); if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); };

async function uploadFile(file){
  drop.classList.add("busy");
  dropLabel.textContent = "Reading " + file.name + " with the model, this takes a few seconds...";
  try {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const resp = await postJSON("/api/upload", { filename: file.name, content_base64: b64 });
    if (resp.ok) { dropLabel.textContent = DROP_TEXT; await select(resp.id); }
    else { dropLabel.textContent = "Could not read that file: " + (resp.error || "error") + ". Click to try another."; await loadInbox(); }
  } catch (err) {
    dropLabel.textContent = "Upload failed: " + err + ". Click to try again.";
  } finally {
    drop.classList.remove("busy");
    fileInput.value = "";
  }
}

loadInbox();
</script>
</body>
</html>
